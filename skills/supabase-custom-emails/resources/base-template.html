<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bienvenida</title>
</head>
<body style="margin: 0; padding: 0; background-color: #e0e5ec; font-family: Arial, Helvetica, sans-serif;">

  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #e0e5ec; padding: 40px 10px;">
    <tr>
      <td align="center">
        <table width="100%" max-width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
          
          <!-- HEADER -->
          <tr>
            <td style="background: linear-gradient(135deg, #0033cc, #000c24); background-color: #001f66; padding: 40px 30px; text-align: center; color: #ffffff;">
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 40px;">
                <tr>
                  <td align="left">
                    <img src="https://i.imgur.com/OqxeOEs.png" alt="SIMPLE business" width="100" style="display: block; border: 0;">
                  </td>
                  <td align="right">
                    <img src="https://i.imgur.com/HLa1BaL.png" alt="Sales Partners" width="85" style="display: block; border: 0;">
                  </td>
                </tr>
              </table>
              <h1 style="font-size: 32px; margin: 0 0 20px 0; font-weight: normal;">¡Hola ${nombre ? nombre : email}!</h1>
              <p style="font-size: 18px; margin: 0 0 15px 0;">Queremos darte la bienvenida oficialmente.</p>
              <p style="font-size: 14px; margin: 0; color: #d0dbe8;">Acabás de dar un paso <strong style="color: #ffffff;">muy importante</strong> para profesionalizar tu área comercial.</p>
            </td>
          </tr>

          <tr>
            <td style="padding: 40px 30px; color: #333333;">

              <!-- REGISTRATION SECTION -->
              <table width="100%" cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 40px; text-align: center;">
                <tr>
                  <td align="center">
                    <p style="color: #333333; font-size: 16px; margin: 0 0 15px 0;">Para empezar a usar la herramienta, creá tu usuario acá:</p>
                    <a href="${actionLink}" style="display: inline-block; background: linear-gradient(90deg, #001f4d, #66b3ff); background-color: #0033cc; color: #ffffff; text-decoration: none; padding: 14px 35px; border-radius: 25px; font-weight: bold; font-size: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">Aceptar invitación y registrarse</a>
                  </td>
                </tr>
              </table>
              
              <!-- FEATURES SECTION --><!-- ... (rest of user's HTML) ... -->
              <p style="text-align: center; font-size: 12px; font-weight: bold; margin-bottom: 20px; color: #000000;">Esta herramienta nace de la asociación entre</p>
              <!-- ASSOCIATION CARDS, FOOTER, etc. -->
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>

</body>
</html>
