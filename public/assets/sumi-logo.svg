<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">Sumi logo</title>
  <desc id="desc">Blue and black Sumi logo on white background with cup icon and tagline.</desc>
  <rect width="1200" height="1200" fill="#ffffff"/>

  <g transform="translate(0 10)">
    <!-- Upper S mark -->
    <path
      d="M 455 270
         C 455 215 498 178 565 178
         H 720
         C 743 178 760 196 760 219
         C 760 242 743 260 720 260
         H 565
         C 520 260 492 286 492 324
         C 492 363 521 390 566 390
         H 646
         C 722 390 771 438 771 505
         C 771 575 719 623 641 623
         H 520
         C 498 623 481 606 481 584
         C 481 563 498 546 520 546
         H 642
         C 681 546 704 524 704 505
         C 704 484 680 463 646 463
         H 566
         C 501 463 455 420 455 355
         Z"
      fill="#1f5fd0"
    />

    <!-- Cup arc -->
    <path
      d="M 384 660
         A 222 222 0 0 0 816 660"
      fill="none"
      stroke="#1f5fd0"
      stroke-width="40"
      stroke-linecap="round"
    />

    <!-- Cup bowl -->
    <path
      d="M 454 640
         C 466 748 540 820 622 820
         C 704 820 778 748 790 640
         Z"
      fill="#111111"
    />

    <!-- Cup highlight -->
    <path
      d="M 733 660
         C 718 720 682 763 639 783
         C 685 773 716 732 727 680
         L 733 660 Z"
      fill="#ffffff"
      opacity="0.95"
    />

    <!-- Right dot -->
    <circle cx="803" cy="612" r="29" fill="#1f5fd0"/>

    <!-- Left cup stem -->
    <path
      d="M 394 661
         C 394 748 444 817 507 847"
      fill="none"
      stroke="#1f5fd0"
      stroke-width="40"
      stroke-linecap="round"
    />
  </g>

  <!-- Wordmark -->
  <g font-family="Arial Rounded MT Bold, Trebuchet MS, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <text x="600" y="965" font-size="174" letter-spacing="-12">
      <tspan fill="#1f5fd0">su</tspan><tspan fill="#111111">mi</tspan>
    </text>
    <circle cx="865" cy="895" r="24" fill="#1f5fd0"/>
  </g>

  <!-- Tagline -->
  <g fill="#111111" font-family="Arial, Helvetica, sans-serif" font-size="34" letter-spacing="6" text-anchor="middle">
    <text x="600" y="1038">PUNTOS &#8226; BENEFICIOS &#8226; CLIENTES FELICES</text>
  </g>
</svg>
